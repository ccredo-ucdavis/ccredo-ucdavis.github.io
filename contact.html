  <nav class="navbar">

  <section class="contact-page">

    <div class="contact-form-section">

      <h1>Let's Talk</h1>

      <form action="https://formspree.io/f/mgoqqydb" method="POST">

        <input type="hidden"
               name="_next"
               value="https://ccredo-ucdavis.github.io/contact.html">

        <label for="name">Your Name <span>*</span></label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email <span>*</span></label>
        <input type="email" id="email" name="email" required>

        <label for="message">Message <span>*</span></label>
        <textarea id="message" name="message" required></textarea>

        <button type="submit">SEND MESSAGE</button>

      </form>

    </div>

    <div class="contact-info-section">

      <h1>Contact Info</h1>

      <a class="contact-icon" href="https://www.linkedin.com/" target="_blank">
        in
      </a>

      <div class="contact-detail">
        <h3>Email Me</h3>
        <p>
          <a href="mailto:cgcredo@ucdavis.edu">cgcredo@ucdavis.edu</a>
        </p>
      </div>

      <div class="contact-detail">
        <h3>Schedule a Meeting</h3>
        <p>
          <a href="https://calendly.com/" target="_blank">Calendly</a>
        </p>
      </div>

    </div>

  </section>
